<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Professional Video Player</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f0f0f;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:Arial, sans-serif;
    padding:15px;
}

.video-wrapper{
    width:100%;
    max-width:900px;
    background:#111;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 10px 40px rgba(0,0,0,0.6);
    position:relative;
}

.video-header{
    padding:14px 18px;
    background:#1a1a1a;
    color:#fff;
    font-size:18px;
    font-weight:600;
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.video-container{
    position:relative;
    width:100%;
    padding-bottom:56.25%;
    background:#000;
}

.video-container iframe{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
}

.video-footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 16px;
    background:#161616;
    color:#ccc;
    font-size:14px;
}

.live-badge{
    background:#ff0033;
    color:#fff;
    padding:4px 10px;
    border-radius:50px;
    font-size:12px;
    font-weight:bold;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{opacity:1;}
    50%{opacity:0.5;}
    100%{opacity:1;}
}

@media(max-width:600px){

.video-header{
    font-size:16px;
    padding:12px;
}

.video-footer{
    font-size:12px;
    padding:10px 12px;
}

}
</style>
</head>

<body>

<div class="video-wrapper">

    <div class="video-header">
        Premium Video Player
    </div>

    <div class="video-container">

        <iframe 
            src="https://streamable.com/e/sm1m6a?autoplay=1"
            allow="fullscreen;autoplay"
            allowfullscreen>
        </iframe>

    </div>

    <div class="video-footer">

        <span>HD Streaming Experience</span>

        <span class="live-badge">
            LIVE
        </span>

    </div>

</div>

</body>
</html>
