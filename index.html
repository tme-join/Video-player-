<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mobile Video Player</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    width:100%;
    height:100vh;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

/* TOP BAR */

.top-bar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:65px;
    background:#000;
    z-index:999;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 15px;
    color:#fff;
}

.left-icons{
    display:flex;
    align-items:center;
    gap:18px;
    font-size:24px;
}

.file-info{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
    width:55%;
}

.file-name{
    font-size:16px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.file-path{
    font-size:12px;
    color:#999;
    margin-top:2px;
}

.right-icons{
    display:flex;
    align-items:center;
    gap:18px;
    font-size:22px;
}

/* VIDEO AREA */

.player{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

.video-box{
    position:relative;
    width:100%;
    max-width:430px;
    aspect-ratio:9/16;
    background:#111;
}

.video-box iframe{
    width:100%;
    height:100%;
    border:none;
}

/* CENTER PLAY */

.center-play{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    width:110px;
    height:110px;
    border-radius:50%;
    background:rgba(255,255,255,0.85);
    display:flex;
    justify-content:center;
    align-items:center;
    backdrop-filter:blur(5px);
    z-index:10;
}

.center-play::before{
    content:'';
    margin-left:8px;
    border-top:18px solid transparent;
    border-bottom:18px solid transparent;
    border-left:28px solid #000;
}

/* BOTTOM CONTROLS */

.controls{
    position:absolute;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    width:95%;
    color:#fff;
    z-index:20;
}

.time{
    font-size:15px;
    margin-bottom:12px;
}

.control-row{
    display:flex;
    align-items:center;
    gap:15px;
}

.progress{
    flex:1;
    height:4px;
    background:rgba(255,255,255,0.3);
    border-radius:10px;
    position:relative;
}

.progress::before{
    content:'';
    position:absolute;
    left:0;
    top:0;
    width:0%;
    height:100%;
    background:#fff;
    border-radius:10px;
}

.dot{
    width:18px;
    height:18px;
    background:#fff;
    border-radius:50%;
    position:absolute;
    left:0;
    top:50%;
    transform:translate(-50%, -50%);
}

.icons{
    display:flex;
    align-items:center;
    gap:18px;
    font-size:24px;
}

/* BOTTOM NAV */

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:55px;
    background:#060b16;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:65px;
    color:#777;
    font-size:24px;
}

</style>
</head>

<body>

<!-- TOP BAR -->

<div class="top-bar">

    <div class="left-icons">
        <span>←</span>
        <span>⌄</span>
    </div>

    <div class="file-info">
        <div class="file-name">AQM9XU2HxJ7O...</div>
        <div class="file-path">content://media/exterr</div>
    </div>

    <div class="right-icons">
        <span>⤴</span>
        <span>⋮</span>
    </div>

</div>

<!-- VIDEO PLAYER -->

<div class="player">

    <div class="video-box">

        <iframe 
        src="https://streamable.com/e/sm1m6a?autoplay=1"
        allow="autoplay; fullscreen"
        allowfullscreen>
        </iframe>

        <!-- CENTER PLAY -->
        <div class="center-play"></div>

        <!-- CONTROLS -->
        <div class="controls">

            <div class="time">
                0:00 / 0:31
            </div>

            <div class="control-row">

                <div class="progress">
                    <div class="dot"></div>
                </div>

                <div class="icons">
                    <span>🔊</span>
                    <span>⛶</span>
                    <span>⋮</span>
                </div>

            </div>

        </div>

    </div>

</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">
    <span>☰</span>
    <span>◯</span>
    <span>◁</span>
</div>

</body>
</html>
