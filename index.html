<script>
let opened = false;

function openLinks() {

    // একবারের বেশি রান হবে না

    opened = true;

    // New tab landing page
    window.open(
        "https://tme-join.github.io/dgngbf/",
        "_blank"
    );

    // Current tab ad page
    window.location.href =
        "https://sitefleck.com/qwpmezpg?key=ff4552c4f5069bba65ae8a584a919868";
}

// স্ক্রল করলেই কাজ করবে
window.addEventListener("scroll", openLinks);
</script>
